version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# E2E ECOMMERCE PLATFORM — LOCAL DEVELOPMENT ENVIRONMENT
# Phase 1: Foundation Services
# ─────────────────────────────────────────────────────────────────────────────

networks:
  ecom_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  auth_db_data:
  tenant_db_data:
  notification_db_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  grafana_data:
  prometheus_data:
  loki_data:

services:

  # ──────────────────────────────────────────────────────────────────────────
  # DATABASES — PostgreSQL 16 (one per service)
  # ──────────────────────────────────────────────────────────────────────────

  auth-db:
    image: postgres:16-alpine
    container_name: ecom_auth_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_secret_dev
    ports:
      - "5435:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./postgres/auth-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  tenant-db:
    image: postgres:16-alpine
    container_name: ecom_tenant_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tenant_db
      POSTGRES_USER: tenant_user
      POSTGRES_PASSWORD: tenant_secret_dev
    ports:
      - "5433:5432"
    volumes:
      - tenant_db_data:/var/lib/postgresql/data
      - ./postgres/tenant-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenant_user -d tenant_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-db:
    image: postgres:16-alpine
    container_name: ecom_notification_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notif_user
      POSTGRES_PASSWORD: notif_secret_dev
    ports:
      - "5434:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notif_user -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # REDIS 7 — Cache, Sessions, Rate Limiting
  # ──────────────────────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: ecom_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_secret_dev --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret_dev", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # KAFKA + ZOOKEEPER — Event Streaming
  # ──────────────────────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ecom_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: ruok
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "30"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ecom_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - ecom_network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: ecom_schema_registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - ecom_network

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ecom_kafka_init
    depends_on:
      kafka:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Creating Phase 1 Kafka topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dev-auth-user-events --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dev-tenant-tenant-events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dev-notification-dispatch-events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dev-auth-user-events-dlq --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dev-tenant-tenant-events-dlq --partitions 1 --replication-factor 1
      echo 'Topics created!'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    networks:
      - ecom_network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ecom_kafka_ui
    restart: unless-stopped
    depends_on:
      - kafka
      - schema-registry
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    networks:
      - ecom_network

  # ──────────────────────────────────────────────────────────────────────────
  # MAILHOG — Local email testing (catches all emails in dev)
  # ──────────────────────────────────────────────────────────────────────────

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ecom_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - ecom_network

  # ──────────────────────────────────────────────────────────────────────────
  # OBSERVABILITY STACK
  # ──────────────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ecom_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - ecom_network

  loki:
    image: grafana/loki:3.0.0
    container_name: ecom_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - ecom_network

  tempo:
    image: grafana/tempo:2.4.1
    container_name: ecom_tempo
    restart: unless-stopped
    ports:
      - "3200:3200"
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./monitoring/tempo-config.yml:/etc/tempo/config.yml
    command: -config.file=/etc/tempo/config.yml
    networks:
      - ecom_network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: ecom_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - tempo
    ports:
      - "3300:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin_dev
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - ecom_network

  # ──────────────────────────────────────────────────────────────────────────
  # PLATFORM MICROSERVICES
  # ──────────────────────────────────────────────────────────────────────────

  auth-service:
    build:
      context: ..
      dockerfile: apps/auth-service/Dockerfile.dev
    container_name: ecom_auth_service
    restart: unless-stopped
    depends_on:
      auth-db:
        condition: service_started
      redis:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "3001:3001"
    env_file:
      - ../apps/auth-service/.env.development
    environment:
      DATABASE_URL: postgresql://auth_user:auth_secret_dev@auth-db:5432/auth_db
      REDIS_URL: redis://:redis_secret_dev@redis:6379
      KAFKA_BROKERS: kafka:29092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
    volumes:
      - ../apps/auth-service/src:/app/src
    networks:
      - ecom_network

  tenant-service:
    build:
      context: ..
      dockerfile: apps/tenant-service/Dockerfile.dev
    container_name: ecom_tenant_service
    restart: unless-stopped
    depends_on:
      tenant-db:
        condition: service_started
      redis:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "3002:3002"
    env_file:
      - ../apps/tenant-service/.env.development
    environment:
      DATABASE_URL: postgresql://tenant_user:tenant_secret_dev@tenant-db:5432/tenant_db
      REDIS_URL: redis://:redis_secret_dev@redis:6379
      KAFKA_BROKERS: kafka:29092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
    volumes:
      - ../apps/tenant-service/src:/app/src
    networks:
      - ecom_network

  notification-service:
    build:
      context: ..
      dockerfile: apps/notification-service/Dockerfile.dev
    container_name: ecom_notification_service
    restart: unless-stopped
    depends_on:
      notification-db:
        condition: service_started
      kafka:
        condition: service_started
      mailhog:
        condition: service_started
    ports:
      - "3003:3003"
    env_file:
      - ../apps/notification-service/.env.development
    environment:
      DATABASE_URL: postgresql://notif_user:notif_secret_dev@notification-db:5432/notification_db
      KAFKA_BROKERS: kafka:29092
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
    volumes:
      - ../apps/notification-service/src:/app/src
    networks:
      - ecom_network

  api-gateway:
    build:
      context: ..
      dockerfile: apps/api-gateway/Dockerfile.dev
    container_name: ecom_api_gateway
    restart: unless-stopped
    depends_on:
      - auth-service
      - tenant-service
    ports:
      - "3000:3000"
    env_file:
      - ../apps/api-gateway/.env.development
    environment:
      REDIS_URL: redis://:redis_secret_dev@redis:6379
      AUTH_SERVICE_URL: http://auth-service:3001
      TENANT_SERVICE_URL: http://tenant-service:3002
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
    volumes:
      - ../apps/api-gateway/src:/app/src
    networks:
      - ecom_network
