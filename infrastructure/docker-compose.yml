version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# E2E ECOMMERCE PLATFORM — LOCAL DEVELOPMENT ENVIRONMENT
# Phase 1: Foundation Services
# ─────────────────────────────────────────────────────────────────────────────

networks:
  ecom_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  auth_db_data:
  tenant_db_data:
  notification_db_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  grafana_data:
  prometheus_data:
  loki_data:
  catalog_db_data:
  es_data:
  inventory_db_data:
  order_db_data:
  pricing_db_data:
  cart_db_data:
  payment_db_data:

services:

  # ──────────────────────────────────────────────────────────────────────────
  # DATABASES — PostgreSQL 16 (one per service)
  # ──────────────────────────────────────────────────────────────────────────

  auth-db:
    image: postgres:16-alpine
    container_name: ecom_auth_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_secret_dev
    ports:
      - "5435:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./postgres/auth-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  tenant-db:
    image: postgres:16-alpine
    container_name: ecom_tenant_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tenant_db
      POSTGRES_USER: tenant_user
      POSTGRES_PASSWORD: tenant_secret_dev
    ports:
      - "5433:5432"
    volumes:
      - tenant_db_data:/var/lib/postgresql/data
      - ./postgres/tenant-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenant_user -d tenant_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-db:
    image: postgres:16-alpine
    container_name: ecom_notification_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notif_user
      POSTGRES_PASSWORD: notif_secret_dev
    ports:
      - "5434:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notif_user -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-db:
    image: postgres:16-alpine
    container_name: ecom_catalog_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_secret_dev
    ports:
      - "5436:5432"
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory-db:
    image: postgres:16-alpine
    container_name: ecom_inventory_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_secret_dev
      POSTGRES_DB: inventory_db
    ports:
      - "5437:5432"
    volumes:
      - inventory_db_data:/var/lib/postgresql/data
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:16-alpine
    container_name: ecom_order_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_secret_dev
      POSTGRES_DB: order_db
    ports:
      - "5438:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pricing-db:
    image: postgres:16-alpine
    container_name: ecom_pricing_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pricing_user
      POSTGRES_PASSWORD: pricing_secret_dev
      POSTGRES_DB: pricing_db
    ports:
      - "5439:5432"
    volumes:
      - pricing_db_data:/var/lib/postgresql/data
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricing_user -d pricing_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  cart-db:
    image: postgres:16-alpine
    container_name: ecom_cart_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cart_user
      POSTGRES_PASSWORD: cart_secret_dev
      POSTGRES_DB: cart_db
    ports:
      - "5440:5432"
    volumes:
      - cart_db_data:/var/lib/postgresql/data
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cart_user -d cart_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # REDIS 7 — Cache, Sessions, Rate Limiting
  # ──────────────────────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: ecom_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_secret_dev --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret_dev", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # KAFKA + ZOOKEEPER — Event Streaming
  # ──────────────────────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ecom_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: ruok
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "30"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ecom_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD", "cub", "kafka-ready", "-b", "localhost:9092", "1", "20"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: ecom_schema_registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - ecom_network

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ecom_kafka_init
    depends_on:
      kafka:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command: |
      /bin/sh -c "
      echo 'Creating Phase 2 Kafka topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dev-auth-user-events --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dev-tenant-tenant-events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dev-notification-dispatch-events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dev-catalog-events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dev-inventory-events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dev-order-events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dev-pricing-events --partitions 3 --replication-factor 1
      echo 'Topics created!'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    networks:
      - ecom_network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ecom_kafka_ui
    restart: unless-stopped
    depends_on:
      - kafka
      - schema-registry
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    networks:
      - ecom_network

  # ──────────────────────────────────────────────────────────────────────────
  # MAILHOG — Local email testing (catches all emails in dev)
  # ──────────────────────────────────────────────────────────────────────────

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ecom_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - ecom_network

  # ──────────────────────────────────────────────────────────────────────────
  # OBSERVABILITY STACK
  # ──────────────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ecom_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - ecom_network

  loki:
    image: grafana/loki:3.0.0
    container_name: ecom_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - ecom_network

  tempo:
    image: grafana/tempo:2.4.1
    container_name: ecom_tempo
    restart: unless-stopped
    ports:
      - "3200:3200"
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./monitoring/tempo-config.yml:/etc/tempo/config.yml
    command: -config.file=/etc/tempo/config.yml
    networks:
      - ecom_network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: ecom_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - tempo
    ports:
      - "3300:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin_dev
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - ecom_network

  # ──────────────────────────────────────────────────────────────────────────
  # PLATFORM MICROSERVICES
  # ──────────────────────────────────────────────────────────────────────────

  auth-service:
    build:
      context: ..
      dockerfile: apps/auth-service/Dockerfile.dev
    container_name: ecom_auth_service
    restart: unless-stopped
    depends_on:
      auth-db:
        condition: service_started
      redis:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "3001:3001"
    env_file:
      - ../apps/auth-service/.env.development
    environment:
      DATABASE_URL: postgresql://auth_user:auth_secret_dev@auth-db:5432/auth_db
      REDIS_URL: redis://:redis_secret_dev@redis:6379
      KAFKA_BROKERS: kafka:29092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
    volumes:
      - ../apps/auth-service/src:/app/src
    networks:
      - ecom_network

  tenant-service:
    build:
      context: ..
      dockerfile: apps/tenant-service/Dockerfile.dev
    container_name: ecom_tenant_service
    restart: unless-stopped
    depends_on:
      tenant-db:
        condition: service_started
      redis:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "3002:3002"
    env_file:
      - ../apps/tenant-service/.env.development
    environment:
      DATABASE_URL: postgresql://tenant_user:tenant_secret_dev@tenant-db:5432/tenant_db
      REDIS_URL: redis://:redis_secret_dev@redis:6379
      KAFKA_BROKERS: kafka:29092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
    volumes:
      - ../apps/tenant-service/src:/app/src
    networks:
      - ecom_network

  notification-service:
    build:
      context: ..
      dockerfile: apps/notification-service/Dockerfile.dev
    container_name: ecom_notification_service
    restart: unless-stopped
    depends_on:
      notification-db:
        condition: service_started
      kafka:
        condition: service_started
      mailhog:
        condition: service_started
    ports:
      - "3003:3003"
    env_file:
      - ../apps/notification-service/.env.development
    environment:
      DATABASE_URL: postgresql://notif_user:notif_secret_dev@notification-db:5432/notification_db
      KAFKA_BROKERS: kafka:29092
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
    volumes:
      - ../apps/notification-service/src:/app/src
    networks:
      - ecom_network

  api-gateway:
    build:
      context: ..
      dockerfile: apps/api-gateway/Dockerfile.dev
    container_name: ecom_api_gateway
    restart: unless-stopped
    depends_on:
      - auth-service
      - tenant-service
    ports:
      - "3000:3000"
    env_file:
      - ../apps/api-gateway/.env.development
    environment:
      REDIS_URL: redis://:redis_secret_dev@redis:6379
      AUTH_SERVICE_URL: http://auth-service:3001
      TENANT_SERVICE_URL: http://tenant-service:3002
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
    volumes:
      - ../apps/api-gateway/src:/app/src
    networks:
      - ecom_network

  catalog-service:
    build:
      context: ..
      dockerfile: apps/catalog-service/Dockerfile.dev
    container_name: ecom_catalog_service
    restart: unless-stopped
    depends_on:
      catalog-db:
        condition: service_started
      redis:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "3004:3004"
    env_file:
      - ../apps/catalog-service/.env.development
    environment:
      DATABASE_URL: postgresql://catalog_user:catalog_secret_dev@catalog-db:5432/catalog_db
      REDIS_URL: redis://:redis_secret_dev@redis:6379
      KAFKA_BROKERS: kafka:29092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
    volumes:
      - ../apps/catalog-service/src:/app/apps/catalog-service/src
    networks:
      - ecom_network

  inventory-service:
    build:
      context: ..
      dockerfile: apps/inventory-service/Dockerfile.dev
    container_name: ecom_inventory_service
    restart: unless-stopped
    ports:
      - "3008:3008"
    depends_on:
      inventory-db:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - ../apps/inventory-service/.env.development
    environment:
      DATABASE_URL: postgresql://inventory_user:inventory_secret_dev@inventory-db:5432/inventory_db
      REDIS_URL: redis://:redis_secret_dev@redis:6379
      KAFKA_BROKERS: kafka:29092
    volumes:
      - ../apps/inventory-service/src:/app/apps/inventory-service/src
    networks:
      - ecom_network

  order-service:
    build:
      context: ..
      dockerfile: apps/order-service/Dockerfile.dev
    container_name: ecom_order_service
    restart: unless-stopped
    ports:
      - "3006:3006"
    depends_on:
      order-db:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - ../apps/order-service/.env.development
    environment:
      DATABASE_URL: postgresql://order_user:order_secret_dev@order-db:5432/order_db
      REDIS_URL: redis://:redis_secret_dev@redis:6379
      KAFKA_BROKERS: kafka:29092
    volumes:
      - ../apps/order-service/src:/app/apps/order-service/src
    networks:
      - ecom_network

  pricing-service:
    build:
      context: ..
      dockerfile: apps/pricing-service/Dockerfile.dev
    container_name: ecom_pricing_service
    restart: unless-stopped
    ports:
      - "3009:3009"
    depends_on:
      pricing-db:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - ../apps/pricing-service/.env.development
    environment:
      DATABASE_URL: postgresql://pricing_user:pricing_secret_dev@pricing-db:5432/pricing_db
      REDIS_URL: redis://:redis_secret_dev@redis:6379
      KAFKA_BROKERS: kafka:29092
    volumes:
      - ../apps/pricing-service/src:/app/apps/pricing-service/src
    networks:
      - ecom_network

  cart-service:
    build:
      context: ..
      dockerfile: apps/cart-service/Dockerfile.dev
    container_name: ecom_cart_service
    restart: unless-stopped
    ports:
      - "3005:3005"
    depends_on:
      cart-db:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - ../apps/cart-service/.env.development
    environment:
      DATABASE_URL: postgresql://cart_user:cart_secret_dev@cart-db:5432/cart_db
      REDIS_URL: redis://:redis_secret_dev@redis:6379
      KAFKA_BROKERS: kafka:29092
    volumes:
      - ../apps/cart-service/src:/app/apps/cart-service/src
    networks:
      - ecom_network

  payment-db:
    image: postgres:16-alpine
    container_name: ecom_payment_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_secret_dev
      POSTGRES_DB: payment_db
    ports:
      - "5441:5432"
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user -d payment_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: ..
      dockerfile: apps/payment-service/Dockerfile.dev
    container_name: ecom_payment_service
    restart: unless-stopped
    ports:
      - "3007:3007"
    depends_on:
      payment-db:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - ../apps/payment-service/.env.development
    environment:
      DATABASE_URL: postgresql://payment_user:payment_secret_dev@payment-db:5432/payment_db
      REDIS_URL: redis://:redis_secret_dev@redis:6379
      KAFKA_BROKERS: kafka:29092
    volumes:
      - ../apps/payment-service/src:/app/apps/payment-service/src
    networks:
      - ecom_network

  storefront:
    build:
      context: ..
      dockerfile: apps/storefront/Dockerfile.dev
    container_name: ecom_storefront
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NEXT_PUBLIC_API_URL: http://api-gateway:3000/v1
    volumes:
      - ../apps/storefront:/app/apps/storefront
      - /app/apps/storefront/node_modules
    networks:
      - ecom_network

  # ──────────────────────────────────────────────────────────────────────────
  # SEARCH ENGINES — Elasticsearch 8 & Typesense
  # ──────────────────────────────────────────────────────────────────────────

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.2
    container_name: ecom_elasticsearch
    restart: unless-stopped
    environment:
      - node.name=elasticsearch
      - cluster.name=ecom_search
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9200 || curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.2
    container_name: ecom_kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - ecom_network

  typesense:
    image: typesense/typesense:26.0
    container_name: ecom_typesense
    restart: unless-stopped
    ports:
      - "8108:8108"
    environment:
      - TYPESENSE_API_KEY=typesense_secret_dev
      - TYPESENSE_DATA_DIR=/data
    volumes:
      - ./typesense/data:/data
    networks:
      - ecom_network
